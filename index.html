        :root {

<body class="flex flex-col antialiased bg-[#2b2f35] font-sans min-h-screen text-[#e0e6ed]">
    <div id="root" class="flex flex-col flex-1"></div>
    <script type="module">
        "use strict";
        import React, { useRef, useState, StrictMode } from 'react';
        import { Cpu, FolderUp, Folder, Files, Sliders, RotateCcw, Award, Split, Play, FolderTree, Repeat, Layers, Copy, Download, History, Pencil, Terminal, XCircle } from 'lucide-react';
        import { motion, AnimatePresence } from 'motion/react';
        import { createRoot } from 'react-dom/client';
        class VirtualFileSystem {
            files = new Map();
            constructor(initialFiles) {
                if (initialFiles) {
                    this.files = new Map(initialFiles);
                }
            }
            read(path) {
                return this.files.get(path);
            }
            write(path, content) {
                this.files.set(path, content);
            }
            delete(path) {
                this.files.delete(path);
            }
            list(extension) {
                const allPaths = Array.from(this.files.keys());
                if (extension) {
                    return allPaths.filter(p => p.endsWith(extension));
                }
                return allPaths;
            }
            getAll() {
                return new Map(this.files);
            }
        }
        class AssetExtractorFacade {
            /**
               * Extracts JS, CSS and pure HTML from the input sources.
               * Leaves external CDN links (http://, https://, //) untouched.
               */
            static extract(config) {
                const vfs = new VirtualFileSystem();
                if (config.mode === 'direct') {
                    const code = config.inputCode.trim(); // 先頭付近にHTML特有のタグが含まれているかを判定
                    const isHtml = /^\s*(<!doctype|<html|<head|<body|<div|<main|<section|<article|<span|<p|<style|<script)/i.test(code);
                    if (isHtml) {
                        // HTMLと判定されたら、モードとファイル名を自動で上書きし、HTML抽出ルートへ進ませる
                        config.mode = 'html';
                        config.htmlEntry = 'input.html';
                        vfs.write('input.html', config.inputCode);
                    } else {
                        // JS/TSと判定されたら、従来通りJSとして保存して終了
                        vfs.write('input.js', config.inputCode);
                        return vfs;
                    }
                } else {
                    // Add files from state
                    config.files.forEach((content, path) => {
                        vfs.write(path, content);
                    });
                } // Complete extraction for HTML if it's the entry
                if (config.mode === 'html' && config.htmlEntry) {
                    const html = vfs.read(config.htmlEntry) || '';
                    if (html) {
                        try {
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(html, 'text/html');
                            const jsEntries = [];
                            const cssEntries = []; // 1. Extract script tags
                            const scripts = doc.querySelectorAll('script');
                            scripts.forEach((script, idx) => {
                                const src = script.getAttribute('src');
                                const typeAttr = (script.getAttribute('type') || '').toLowerCase().trim();
                                if (src) {
                                    if (/^(https?:)?\/\//i.test(src)) return;
                                    const normalized = src.replace(/^\.\//, '');
                                    jsEntries.push(normalized);
                                    script.remove();
                                } else {
                                    const content = script.textContent || '';
                                    if (content.trim()) {
                                        // 古い importmap は抽出せずに消去してリセットする
                                        if (typeAttr === 'importmap') {
                                            script.remove();
                                            return;
                                        } // JSONデータなどの非JSコードはコンパイルすると壊れるので除外
                                        if (typeAttr === 'application/json' || typeAttr === 'application/ld+json') {
                                            return;
                                        }
                                        const isTS = typeAttr.includes('ts') || typeAttr.includes('typescript') || content.includes(': number') || content.includes(': string') || content.includes('interface ') || content.includes('type ');
                                        const isJSX = content.includes('React.') || /<[A-Z][A-Za-z0-9]*\s*\/?>/.test(content);
                                        let ext = '.js';
                                        if (isTS) ext = isJSX ? '.tsx' : '.ts'; else if (isJSX) ext = '.jsx';
                                        const namespace = config.htmlEntry.replace(/[^a-zA-Z0-9_]/g, '_');
                                        const inlinePath = `_inline_script_${namespace}_${idx}${ext}`;
                                        vfs.write(inlinePath, content); // タグを消さずにプレースホルダーをセットする（定位置を記憶）
                                        const placeholder = `___INLINE_SCRIPT_${namespace}_${idx}___`;
                                        script.textContent = placeholder;
                                        const metaStr = vfs.read('_meta_inline_scripts.json');
                                        const inlineList = metaStr ? JSON.parse(metaStr) : [];
                                        inlineList.push({
                                            id: `${namespace}_${idx}`,
                                            placeholder,
                                            path: inlinePath
                                        });
                                        vfs.write('_meta_inline_scripts.json', JSON.stringify(inlineList));
                                    }
                                }
                            }); // 2. Extract stylesheet link tags
                            const links = doc.querySelectorAll('link[rel="stylesheet"]');
                            links.forEach(link => {
                                const href = link.getAttribute('href');
                                if (href) {
                                    // 外部のCSSリンク（Google Fontsなど）は保護する
                                    if (/^(https?:)?\/\//i.test(href)) {
                                        return;
                                    }
                                    const normalized = href.replace(/^\.\//, '');
                                    cssEntries.push(normalized);
                                    link.remove();
                                }
                            }); // Prepend <!DOCTYPE html> if original started with it
                            let cleanedHtml = doc.documentElement.outerHTML;
                            if (html.trim().toLowerCase().startsWith('<!doctype')) {
                                cleanedHtml = '<!DOCTYPE html>\n' + cleanedHtml;
                            } // Write back the cleaned HTML (without the extracted tags) and the metadata
                            vfs.write(config.htmlEntry, cleanedHtml);
                            vfs.write('_meta_extracted_js.json', JSON.stringify(jsEntries));
                            vfs.write('_meta_extracted_css.json', JSON.stringify(cssEntries));
                            console.log(`[AssetExtractorFacade] Successfully parsed HTML entry '${config.htmlEntry}':`, {
                                jsEntries,
                                cssEntries
                            });
                        } catch (e) {
                            console.error('[AssetExtractorFacade] Failed to parse HTML entry:', e.message);
                        }
                    }
                }
                return vfs;
            }
        }
        class ASTBuilder {
            static inferJSXConfig(vfs) {
                const config = {};
                if (!vfs) return config; // 1. Try to read tsconfig.json
                const tsconfigContent = typeof vfs.read === 'function' ? vfs.read('tsconfig.json') || vfs.read('/tsconfig.json') : null;
                if (tsconfigContent) {
                    try {
                        const placeholders = [];
                        const stringRegex = /("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')/g;
                        let cleaned = tsconfigContent.replace(stringRegex, match => {
                            const id = `___JSONC_STR_${placeholders.length}___`;
                            placeholders.push(match);
                            return id;
                        });
                        cleaned = cleaned.replace(/\/\*[\s\S]*?\*\/|\/\/.*$/gm, '');
                        for (let i = placeholders.length - 1; i >= 0; i--) {
                            cleaned = cleaned.replace(`___JSONC_STR_${i}___`, () => placeholders[i]);
                        }
                        const parsed = JSON.parse(cleaned);
                        const compilerOptions = parsed?.compilerOptions;
                        if (compilerOptions) {
                            if (compilerOptions.jsxFactory) {
                                config.factory = compilerOptions.jsxFactory;
                            }
                            if (compilerOptions.jsxFragmentFactory) {
                                config.fragment = compilerOptions.jsxFragmentFactory;
                            }
                            if (compilerOptions.jsx) {
                                const jsx = String(compilerOptions.jsx).toLowerCase();
                                if (jsx.includes('react-jsx')) {
                                    config.runtime = 'automatic';
                                } else if (jsx === 'preserve' || jsx === 'react') {
                                    config.runtime = 'classic';
                                }
                            }
                            if (compilerOptions.jsxImportSource) {
                                config.importSource = compilerOptions.jsxImportSource;
                            }
                        }
                    } catch (e) {
                        console.warn('[JSXInference] Failed to parse tsconfig.json:', e);
                    }
                } // 2. Try to read package.json
                const packageContent = typeof vfs.read === 'function' ? vfs.read('package.json') || vfs.read('/package.json') : null;
                if (packageContent) {
                    try {
                        const parsed = JSON.parse(packageContent);
                        const deps = {
                            ...parsed?.dependencies,
                            ...parsed?.devDependencies
                        };
                        if (deps) {
                            if (deps['preact']) {
                                config.factory = config.factory || 'h';
                                config.fragment = config.fragment || 'Fragment';
                                config.importSource = config.importSource || 'preact';
                                config.runtime = config.runtime || 'classic';
                            } else if (deps['solid-js']) {
                                config.isSolid = true;
                            }
                        }
                    } catch (e) {
                        console.warn('[JSXInference] Failed to parse package.json:', e);
                    }
                }
                return config;
            }
            static build(sourceCode, filePath, vfs) {
                try {
                    const Babel = window.Babel;
                    if (!Babel) {
                        throw new Error("Babel standalone is not loaded on the window object.");
                    }
                    const isTS = filePath.endsWith('.ts') || filePath.endsWith('.tsx');
                    const isJSX = filePath.endsWith('.jsx') || filePath.endsWith('.tsx');
                    const presets = [];
                    if (isTS) presets.push('typescript');
                    if (isJSX) {
                        const jsxConfig = this.inferJSXConfig(vfs);
                        if (jsxConfig.isSolid && Babel.availablePresets && Babel.availablePresets['solid']) {
                            presets.push('solid');
                        } else {
                            const reactOpts = {};
                            if (jsxConfig.factory) reactOpts.pragma = jsxConfig.factory;
                            if (jsxConfig.fragment) reactOpts.pragmaFrag = jsxConfig.fragment;
                            if (jsxConfig.runtime) reactOpts.runtime = jsxConfig.runtime;
                            if (jsxConfig.importSource) reactOpts.importSource = jsxConfig.importSource;
                            presets.push(['react', reactOpts]);
                        }
                    } // 1. まず完全にトランスパイルを実行し、型とJSXを消し去った「ピュアなJS文字列」を得る
                    const transformed = Babel.transform(sourceCode, {
                        filename: filePath,
                        presets,
                        ast: false,
                        code: true,
                        caller: {
                            name: 'ast-builder',
                            supportsStaticESM: true
                        }
                    });
                    const pureJsCode = transformed.code || ''; // 2. ピュアなJS文字列を、今度はプラグインなしで純粋にパースしてクリーンなASTを得る
                    const astResult = Babel.transform(pureJsCode, {
                        filename: filePath.replace(/\.(ts|tsx|jsx)$/, '.js'),
                        presets: [],
                        ast: true,
                        code: false,
                        parserOpts: {
                            sourceType: 'module'
                        }
                    });
                    if (!astResult || !astResult.ast) {
                        throw new Error("Babel failed to produce an AST from the transpiled code.");
                    }
                    return astResult.ast;
                } catch (e) {
                    console.error("[ASTBuilder] 構文解析・変換エラー:", e.message);
                    throw e;
                }
            }
        }
        function generateIrId() {
            return `ir_${Math.random().toString(36).substring(2, 9)}`;
        }
        class ASTtoIRConverter {
            static convert(ast, scopeInfo, filePath) {
                const astToIrIdMap = new Map();
                function convertNode(node) {
                    if (!node || typeof node !== 'object' || !node.type) {
                        return null;
                    }
                    const irNodeId = generateIrId();
                    if (node._astNodeId) astToIrIdMap.set(node._astNodeId, irNodeId);
                    const children = [];
                    const convertChild = childAst => {
                        if (!childAst) return null;
                        const childIr = convertNode(childAst);
                        if (childIr) {
                            children.push(childIr);
                            return {
                                type: 'ref',
                                irNodeId: childIr.irNodeId
                            };
                        }
                        return null;
                    };
                    const convertChildArray = childAstArray => {
                        if (!Array.isArray(childAstArray)) return [];
                        const refs = [];
                        for (const childAst of childAstArray) {
                            if (childAst && typeof childAst === 'object' && childAst.type) {
                                const ref = convertChild(childAst);
                                if (ref) refs.push(ref);
                            } else {
                                refs.push(childAst);
                            }
                        }
                        return refs;
                    };
                    let props = {}; // 1. ホワイトリストによる主要プロパティの抽出
                    switch (node.type) {
                        case 'Identifier':
                            props = {
                                name: String(node.name || '')
                            };
                            break;
                        case 'NumericLiteral':
                        case 'BooleanLiteral':
                        case 'StringLiteral':
                            props = {
                                value: node.value
                            };
                            break;
                        case 'BinaryExpression':
                        case 'LogicalExpression':
                        case 'AssignmentExpression':
                            props = {
                                operator: String(node.operator || ''),
                                left: convertChild(node.left),
                                right: convertChild(node.right)
                            };
                            break;
                        case 'UpdateExpression':
                            props = {
                                operator: String(node.operator || ''),
                                prefix: Boolean(node.prefix),
                                argument: convertChild(node.argument)
                            };
                            break;
                        case 'MemberExpression':
                            props = {
                                computed: Boolean(node.computed),
                                object: convertChild(node.object),
                                property: convertChild(node.property)
                            };
                            break;
                        case 'IfStatement':
                        case 'ConditionalExpression':
                            props = {
                                test: convertChild(node.test),
                                consequent: convertChild(node.consequent),
                                alternate: convertChild(node.alternate)
                            };
                            break;
                        case 'VariableDeclaration':
                            props = {
                                kind: String(node.kind || ''),
                                declarations: convertChildArray(node.declarations)
                            };
                            break;
                        case 'VariableDeclarator':
                            props = {
                                id: convertChild(node.id),
                                init: convertChild(node.init)
                            };
                            break;
                        case 'ArrowFunctionExpression':
                            props = {
                                params: convertChildArray(node.params),
                                body: convertChild(node.body),
                                async: Boolean(node.async),
                                generator: Boolean(node.generator)
                            };
                            break;
                        case 'CallExpression':
                            props = {
                                callee: convertChild(node.callee),
                                arguments: convertChildArray(node.arguments)
                            };
                            break;
                        case 'ReturnStatement':
                            props = {
                                argument: convertChild(node.argument)
                            };
                            break;
                        case 'ExpressionStatement':
                            props = {
                                expression: convertChild(node.expression)
                            };
                            break;
                        case 'BlockStatement':
                        case 'Program':
                            props = {
                                body: convertChildArray(node.body)
                            };
                            if (node.type === 'Program') props.sourceType = String(node.sourceType || 'script');
                            break;
                    } // 2. フォールバックマージ（可逆性の保証）
                    // ホワイトリストで処理済みのノードであっても、Babel特有の未知のプロパティ(extra等)を失わないように補完する
                    for (const key of Object.keys(node)) {
                        if (key === 'type' || key === 'start' || key === 'end' || key === 'loc' || key.startsWith('_')) continue;
                        if (props[key] !== undefined) continue; // すでにホワイトリストで抽出済みなら上書きしない
                        const value = node[key];
                        if (Array.isArray(value)) {
                            props[key] = convertChildArray(value);
                        } else if (value && typeof value === 'object' && value.type) {
                            props[key] = convertChild(value);
                        } else {
                            props[key] = value;
                        }
                    }
                    return {
                        type: node.type,
                        irNodeId,
                        props,
                        children
                    };
                }
                const rootNode = convertNode(ast);
                const irScopeInfo = {
                    bindings: new Map(),
                    scopes: new Map(scopeInfo.scopes),
                    escapedVars: new Set(),
                    errors: [...scopeInfo.errors]
                };
                for (const [astNodeId, binding] of scopeInfo.bindings.entries()) {
                    const irId = astToIrIdMap.get(astNodeId);
                    if (irId) {
                        const translatedReferences = binding.references.map(astId => astToIrIdMap.get(astId)).filter(id => id !== undefined);
                        irScopeInfo.bindings.set(irId, {
                            name: binding.name,
                            scopeId: binding.scopeId,
                            references: translatedReferences
                        });
                    }
                }
                for (const astNodeId of scopeInfo.escapedVars) {
                    const irId = astToIrIdMap.get(astNodeId);
                    if (irId) irScopeInfo.escapedVars.add(irId);
                }
                return {
                    type: 'IRRoot',
                    irNodeId: generateIrId(),
                    filePath,
                    props: {},
                    children: rootNode ? [rootNode] : [],
                    scopeInfo: irScopeInfo
                };
            }
        }
        class TokenExtractor {
            /**
               * ソースコードを字句解析し、トークンの配列を抽出する
               * Babelの内部APIを隠蔽し、独自のパイプラインで利用可能な形式で返す
               */
            static extract(sourceCode) {
                try {
