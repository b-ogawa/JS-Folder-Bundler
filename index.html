            irNodeId: arrNode.irNodeId
          }, {
            type: 'ref',
            irNodeId: objNode.irNodeId
          }]
        },
        children: [blobIdent, arrNode, objNode]
      };
      const urlIdent = {
        type: 'Identifier',
        irNodeId: genId(),
        props: {
          name: 'URL'
        },
        children: []
      };
      const createIdent = {
        type: 'Identifier',
        irNodeId: genId(),
        props: {
          name: 'createObjectURL'
        },
        children: []
      };
      const memNode = {
        type: 'MemberExpression',
        irNodeId: genId(),
        props: {
          object: {
            type: 'ref',
            irNodeId: urlIdent.irNodeId
          },
          property: {
            type: 'ref',
            irNodeId: createIdent.irNodeId
          },
          computed: false
        },
        children: [urlIdent, createIdent]
      };
      const callNode = {
        type: 'CallExpression',
        irNodeId: genId(),
        props: {
          callee: {
            type: 'ref',
            irNodeId: memNode.irNodeId
          },
          arguments: [{
            type: 'ref',
            irNodeId: newBlobNode.irNodeId
          }]
        },
        children: [memNode, newBlobNode]
      };
      return callNode;
    }
    replacePlaceholderInIR(node, placeholder, replacementIR) {
      let replaced = false;
      if (!node.children) return false;
      for (let i = 0; i < node.children.length; i++) {
        const child = node.children[i];
        if (child.type === 'StringLiteral' && child.props['value'] === placeholder) {
          node.children[i] = replacementIR;
          replaced = true;
          for (const key of Object.keys(node.props)) {
            const prop = node.props[key];
            if (prop && prop.type === 'ref' && prop.irNodeId === child.irNodeId) {
              node.props[key] = {
                type: 'ref',
                irNodeId: replacementIR.irNodeId
              };
            } else if (Array.isArray(prop)) {
              for (let j = 0; j < prop.length; j++) {
                if (prop[j] && prop[j].type === 'ref' && prop[j].irNodeId === child.irNodeId) {
                  prop[j] = {
                    type: 'ref',
                    irNodeId: replacementIR.irNodeId
                  };
                }
              }
            }
          }
        } else {
          if (this.replacePlaceholderInIR(child, placeholder, replacementIR)) {
            replaced = true;
          }
        }
      }
      return replaced;
    }
    resolveCDNUrl(modulePath, isWorker = false) {
      if (/^(https?:)?\/\//i.test(modulePath)) return modulePath;
      let packageJson = null;
      try {
        const pjContent = this.vfs.read('package.json');
        if (pjContent) packageJson = JSON.parse(pjContent);
      } catch (err) {}
      let basePackage = modulePath;
      let subpath = '';
      if (modulePath.startsWith('@')) {
        const parts = modulePath.split('/');
        if (parts.length > 2) {
          basePackage = parts.slice(0, 2).join('/');
          subpath = parts.slice(2).join('/');
        } else {
          basePackage = modulePath;
        }
      } else {
        const parts = modulePath.split('/');
        if (parts.length > 1) {
          basePackage = parts[0];
          subpath = parts.slice(1).join('/');
        }
      }
      let version = '';
      if (packageJson?.dependencies?.[basePackage]) {
        version = packageJson.dependencies[basePackage];
      } else if (packageJson?.devDependencies?.[basePackage]) {
        version = packageJson.devDependencies[basePackage];
      }
      if (version) version = version.replace(/^[\^~]/, '');
      let targetUrl = this.config.cdnTemplate || 'https://esm.sh/[module]@[version]/[path]';
      targetUrl = targetUrl.replace('[module]', basePackage);
      if (version) targetUrl = targetUrl.replace('[version]', version);else targetUrl = targetUrl.replace('@[version]', '').replace('[version]', '');
      if (subpath) targetUrl = targetUrl.replace('[path]', subpath);else targetUrl = targetUrl.replace('/[path]', '').replace('[path]', '');
      return targetUrl;
    }
    extractAndResolveExternalImports(node, isWorker) {
      if (!node) return;
      let pathValueNode = null;
      if (node.type === 'ImportDeclaration' || node.type === 'ImportExpression') {
        const sourceRef = node.props?.['source'];
        if (sourceRef && sourceRef.type === 'ref') {
          pathValueNode = node.children?.find(c => c.irNodeId === sourceRef.irNodeId) || null;
        }
      } else if (node.type === 'CallExpression') {
        const calleeRef = node.props?.['callee'];
        if (calleeRef && calleeRef.type === 'ref') {
          const calleeNode = node.children?.find(c => c.irNodeId === calleeRef.irNodeId);
          if (calleeNode && (calleeNode.type === 'Import' || calleeNode.type === 'Identifier' && calleeNode.props['name'] === 'importScripts')) {
            const args = node.props['arguments'] || [];
            for (const argRef of args) {
              if (argRef && argRef.type === 'ref') {
                const argNode = node.children?.find(c => c.irNodeId === argRef.irNodeId);
                if (argNode && (argNode.type === 'StringLiteral' || argNode.type === 'Literal')) {
                  const val = argNode.props['value'];
                  if (val && typeof val === 'string') {
                    if (!val.startsWith('.') && !val.startsWith('/')) {
                      this.externalImports.add(val);
                      if (isWorker || argNode.props['_isWorkerImport']) {
                        argNode.props['value'] = this.resolveCDNUrl(val, true);
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
      if (pathValueNode && (pathValueNode.type === 'StringLiteral' || pathValueNode.type === 'Literal')) {
        const val = pathValueNode.props['value'];
        if (val && typeof val === 'string') {
          if (!val.startsWith('.') && !val.startsWith('/')) {
            this.externalImports.add(val);
            if (isWorker || pathValueNode.props['_isWorkerImport']) {
              pathValueNode.props['value'] = this.resolveCDNUrl(val, true);
            }
          }
        }
      }
      if (node.children) {
        for (const child of node.children) {
          this.extractAndResolveExternalImports(child, isWorker);
        }
      }
    }
    async compile(entryPaths, isWorker = false) {
      const baseKey = Array.isArray(entryPaths) ? entryPaths.join(',') : entryPaths;
      const cacheKey = `${baseKey}_${isWorker ? 'worker' : 'main'}`;
      if (this.compiledWorlds.has(cacheKey)) {
        return this.compiledWorlds.get(cacheKey);
      }
      this.logger({
        type: 'info',
        msg: `Compiling world entry: ${cacheKey}...`
      });
      if (!this.parsedIRCache) {
        this.parsedIRCache = SourceAnalyzerFacade.analyzeAll(this.vfs, this.filterOptions);
      }
      const irTreesForPrep = this.cloneIRTrees(this.parsedIRCache);
      let existingFiles = irTreesForPrep.map(t => t.filePath);
      if (this.vfs && typeof this.vfs.list === 'function') {
        existingFiles = Array.from(new Set([...existingFiles, ...this.vfs.list()]));
      }
      const paths = Array.isArray(entryPaths) ? entryPaths : [entryPaths];
      for (const p of paths) {
        const entryTree = irTreesForPrep.find(t => t.filePath === p);
        if (!entryTree) {
          throw new Error(`Entry file ${p} was not found in the parsed AST roots.`);
        }
      }
      this.logger({
        type: 'info',
        msg: `[World Debug] Worker config.golfEnabled is: ${this.config.golfEnabled}`
      });
      const parseTemplate = templateCode => {
        try {
          const ir = SourceAnalyzerFacade.analyzeToIR(templateCode, '_boilerplate_template.js', this.vfs);
          const programNode = ir.children[0]?.children?.find(c => c.type === 'Program');
          return programNode?.children || [];
        } catch (err) {
          this.logger({
            type: 'error',
            msg: `[TemplateParser] Failed to parse AST template: ${err.message}`
          });
          return [];
        }
      };
      this.logger({
        type: 'info',
        msg: `Scanning all files for Worker dependencies...`
      });
      const workerPathsSet = new Set(); // 解析済みASTファイルを走査しWorker依存を静的に抽出
      for (const tree of irTreesForPrep) {
        const rawPaths = WorkerDetector.extractRawWorkerPaths(tree, this.logger);
        for (const p of rawPaths) {
          try {
            // ファイルパスを起点に相対パスを解決
            const resolved = PathResolver.resolve(tree.filePath, p, existingFiles, true);
            const base = resolved.replace(/\.(js|ts|jsx|tsx)$/, '');
            const exists = existingFiles.some(f => f.replace(/\.(js|ts|jsx|tsx)$/, '') === base);
            if (exists) {
              if (!workerPathsSet.has(resolved)) {
                workerPathsSet.add(resolved);
                this.logger({
                  type: 'success',
                  msg: `[Dependency Discovery] Found Worker entry: "${resolved}" (from ${tree.filePath})`
                });
              }
            } else {
              this.logger({
                type: 'info',
                msg: `[WorldCompiler] Candidate worker path "${p}" (resolved to "${resolved}") is not a file in the workspace. Skipping.`
              });
            }
          } catch (e) {// パス解決エラーは無視
          }
        }
      }
      const workerPaths = Array.from(workerPathsSet); // プレリンク処理の廃止
      if (workerPaths.length > 0) {
        this.logger({
          type: 'info',
          msg: `Found ${workerPaths.length} multi-threaded entry-points: ${workerPaths.join(', ')}`
        });
      }
      this.logger({
        type: 'info',
        msg: `Executing unified multi-thread link pipeline for ${cacheKey}`
      });
      const irTrees = this.cloneIRTrees(this.parsedIRCache); // 抽出されたWorkerパスを渡してリンクを実行
      const linkedIR = IRLinker.link(irTrees, this.vfs, entryPaths, workerPaths.length > 0 ? workerPaths : undefined, this.logger, this.config.bundleId, parseTemplate);
      let optimizedIR = linkedIR;
      if (this.config.golfEnabled) {
        this.logger({
          type: 'info',
          msg: `Optimizing AST (Golf) for ${cacheKey}`
        });
        const evaluatePureFunction = (funcNode, args) => {
          const Babel = globalThis.Babel;
          if (!Babel) throw new Error("Babel not available");
          const ast = IRtoASTConverter.convert(funcNode);
          const {
            code: funcCode
          } = Babel.transformFromAst({
            type: 'Program',
            body: [ast]
          }, '', {
            presets: [],
            ast: false
          });
          const argStrings = args.map(arg => typeof arg === 'string' ? JSON.stringify(arg) : String(arg));
          const iifeCode = `return (${funcCode})(${argStrings.join(', ')});`;
          return new Function(iifeCode)();
        };
        const optimizerConfig = {
          ...this.config,
          services: {
            evaluatePureFunction
          }
        };
        optimizedIR = IROptimizer.optimize(linkedIR, optimizerConfig);
      } else {
        this.logger({
          type: 'info',
          msg: 'Skipping AST Optimization (golfEnabled is false)'
        });
      }
      this.extractAndResolveExternalImports(optimizedIR, isWorker);
      let jsCode = SourceAnalyzerFacade.generateFromIR(optimizedIR);
      this.compiledWorlds.set(cacheKey, jsCode);
      return jsCode;
    }
  }
  // スクリプト読み込みおよび評価完了の確認
  console.log('[Compiler Worker] Script loaded and evaluated successfully.');
  // 1. インポートしたライブラリを globalThis に登録し、既存コードがそのまま動くようにする
  globalThis.Babel = Babel;
  globalThis.Terser = Terser; // 2. Worker内グローバルのBabelにパッチを適用 (traverse, typesの露出)
  try {
    BabelPatcher.applyPatch();
  } catch (e) {
    console.error("[Compiler Worker] Failed to apply Babel patch:", e);
  } // グローバルエラーのハンドリング
  self.addEventListener('error', e => {
    console.error('[Worker Global Error]', e);
    self.postMessage({
      type: 'error',
      requestId: 'unknown',
      error: {
        message: `[Worker Global Error] ${e.message} (File: ${e.filename}, Line: ${e.lineno})`,
        stack: e.error?.stack || ''
      }
    });
  });
  self.addEventListener('unhandledrejection', e => {
    console.error('[Worker Unhandled Rejection]', e);
    self.postMessage({
      type: 'error',
      requestId: 'unknown',
      error: {
        message: `[Worker Unhandled Rejection] ${e.reason?.message || String(e.reason)}`,
        stack: e.reason?.stack || ''
      }
    });
  }); // 3. メッセージハンドラ
  self.onmessage = async e => {
    const reqId = e.data?.requestId || 'unknown';
    const logger = log => {
      self.postMessage({
        type: 'log',
        requestId: reqId,
        log
      });
    }; // スレッドのメッセージ受信通知
    logger({
      type: 'info',
      msg: '[Worker] Worker thread successfully triggered and received data.'
    });
    try {
      const {
        requestId,
        serializedVfs,
        config,
        filterOptions,
        mainEntryPaths,
        actualMode,
        actualHtmlEntry
      } = e.data;
      logger({
        type: 'info',
        msg: '[Worker] Data deserialization started...'
      });
      const vfs = VirtualFileSystem.fromSerialized(serializedVfs);
      logger({
        type: 'info',
        msg: '[Worker] VFS ready. Starting SourceAnalyzerFacade.analyzeAll...'
      }); // AST解析および元のファイルサイズ計算
      const irTrees = SourceAnalyzerFacade.analyzeAll(vfs, filterOptions);
      logger({
        type: 'info',
        msg: `[Worker] AST analysis complete. Parsed ${irTrees.length} files.`
      });
      let originalSize = 0;
      if (actualMode === 'direct') {
        const inputCode = vfs.read('input.js') || '';
        originalSize = new Blob([inputCode]).size;
      } else {
        for (const tree of irTrees) {
          const fileContent = vfs.read(tree.filePath);
          if (fileContent) originalSize += new Blob([fileContent]).size;
        }
        const htmlPath = actualHtmlEntry || 'index.html';
        const htmlContent = vfs.read(htmlPath);
        if (htmlContent) originalSize += new Blob([htmlContent]).size;
      }
      const worldCompiler = new WorldCompiler(vfs, config, filterOptions, logger); // インラインスクリプトの個別限界圧縮 (WorldCompiler + VariableMangler)
      const inlineMetaStr = vfs.read('_meta_inline_scripts.json');
      if (inlineMetaStr) {
        const inlineList = JSON.parse(inlineMetaStr);
        for (const item of inlineList) {
          let optCode = await worldCompiler.compile(item.path);
          if (config.golfEnabled && config.enableMangle) {
            optCode = await VariableMangler.mangle(optCode, config.terserCompress, logger);
          }
          const cleanCode = optCode.replace(/^["']use strict["'];?\s*/i, '');
          vfs.write(item.path, cleanCode);
        }
      } // メインスクリプトのコンパイル
      let jsCodeStr = '';
      if (mainEntryPaths.length > 0) {
        jsCodeStr = await worldCompiler.compile(mainEntryPaths);
      }
      const externalImportsSet = worldCompiler.getExternalImports(); // メインコードの難読化と圧縮
      if (config.golfEnabled && config.enableMangle) {
        logger({
          type: 'info',
          msg: '[Worker] Executing VariableMangler on main script...'
        });
        jsCodeStr = await VariableMangler.mangle(jsCodeStr, !!config.terserCompress, logger);
      }
      const cleanCode = jsCodeStr.trim();
      if (cleanCode === '') {
        jsCodeStr = '';
      } else if (config.addStrict && !cleanCode.startsWith('"use strict"') && !cleanCode.startsWith("'use strict'")) {
        jsCodeStr = '"use strict";\n' + jsCodeStr;
      } // 4. 成功メッセージの返却
      self.postMessage({
        type: 'success',
        requestId: reqId,
        result: {
          jsCodeStr,
          serializedVfs: vfs.serialize(),
          originalSize,
          externalImports: Array.from(externalImportsSet)
        }
      });
    } catch (err) {
      // エラー詳細を UI のログパネルにも強制出力する
      logger({
        type: 'error',
        msg: `[Worker Exception] ${err?.message || String(err)}\nStack: ${err?.stack || ''}`
      }); // 5. エラーハンドリングとエラー情報の返却
      self.postMessage({
        type: 'error',
        requestId: reqId,
        error: {
          message: err.message,
          stack: err.stack
        }
      });
    }
  };
}
